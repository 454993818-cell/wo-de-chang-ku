
name: Daily Stock Analysis (Feishu Only)
on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas akshare ta-lib

      - name: Run analysis and send to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python3 - << 'EOF'
          import os
          import requests
          import pandas as pd
          import akshare as ak
          import talib
          from datetime import datetime, timedelta

          FEISHU_WEBHOOK_URL = os.getenv("FEISHU_WEBHOOK_URL")
          STOCK_LIST = os.getenv("STOCK_LIST").split(",") if os.getenv("STOCK_LIST") else []

          def get_recent_trade_date():
              today = datetime.today()
              for i in range(7):
                  date = (today - timedelta(days=i)).strftime("%Y%m%d")
                  try:
                      df = ak.stock_zh_index_daily(symbol="sh000001", start_date=date, end_date=date)
                      if not df.empty:
                          return date
                  except:
                      continue
              return datetime.today().strftime("%Y%m%d")

          def send_feishu(content):
              if not FEISHU_WEBHOOK_URL:
                  print("Webhook 未配置")
                  return
              msg = {
                  "msg_type": "text",
                  "content": {"text": content}
              }
              try:
                  r = requests.post(FEISHU_WEBHOOK_URL, json=msg, timeout=15)
                  print("发送状态:", r.status_code)
              except Exception as e:
                  print("发送异常:", e)

          def analyze_stock(code, trade_date):
              try:
                  if code.startswith("6"):
                      symbol = f"sh{code}"
                  elif code.startswith("0") or code.startswith("3"):
                      symbol = f"sz{code}"
                  else:
                      symbol = code

                  start_date = (datetime.strptime(trade_date, "%Y%m%d") - timedelta(days=70)).strftime("%Y%m%d")
                  df = ak.stock_zh_a_daily(symbol=symbol, start_date=start_date, end_date=trade_date)
                  if df.empty or len(df) < 30:
                      return f"- {code}: 样本不足\n", "观望", 0, "neutral"

                  df = df.sort_values("date").reset_index(drop=True)
                  close = df["close"].values
                  high = df["high"].values
                  low = df["low"].values
                  volume = df["volume"].values

                  ma5 = talib.SMA(close, 5)[-1]
                  ma10 = talib.SMA(close, 10)[-1]
                  ma20 = talib.SMA(close, 20)[-1]
                  rsi = talib.RSI(close, 14)[-1]
                  macd, macdsignal, macdhist = talib.MACD(close)
                  upper, middle, lower = talib.BBANDS(close, 20)
                  current_price = close[-1]
                  price_change = (current_price - close[-2])/close[-2]*100 if len(close)>=2 else 0

                  vol_ma5 = talib.SMA(volume,5)[-1]
                  vol_current = volume[-1]
                  vol_ratio = vol_current / vol_ma5 if vol_ma5>0 else 1
                  vol_note = "缩量上涨" if vol_ratio < 0.9 and price_change>0 else "放量上涨" if vol_ratio>1.2 and price_change>0 else "平量"
                  turnover = df['volume'].iloc[-1]/(df['high'].iloc[-1]*10000) if df['high'].iloc[-1] else 0

                  if ma5 > ma10 > ma20:
                      trend = "bullish"
                      trend_strength = 60
                  elif ma5 < ma10 < ma20:
                      trend = "bearish"
                      trend_strength = 30
                  else:
                      trend = "weak_bearish"
                      trend_strength = 40

                  support = round(low[-5:].min() * 0.99, 2)
                  resistance = round(high[-5:].max() * 1.01, 2)
                  stop_loss = support
                  target = resistance
                  buy_point = support
                  secondary_buy = support

                  if trend == "bullish" and rsi < 60:
                      core_decision = "买入"
                      action_hold = "可继续持有，回踩关键位不破再考虑加仓"
                      action_empty = "可结合支撑位分批试仓，避免一次性追高"
                      position = "轻仓试仓"
                  elif trend == "bearish" or rsi > 70:
                      core_decision = "观望/减仓"
                      action_hold = "逢高减仓，控制风险"
                      action_empty = "观望为主，等待企稳信号"
                      position = "观望"
                  else:
                      core_decision = "中性"
                      action_hold = "继续持有，关注支撑位有效性"
                      action_empty = "轻仓试仓，严格止损"
                      position = "轻仓试仓"

                  rsi_note = "超买" if rsi>70 else "超卖" if rsi<30 else "中性"
                  bias = abs((current_price - ma5)/ma5*100)
                  bias_note = "偏高" if current_price>ma5 else "偏低"
                  macd_note = "金叉" if macd[-1]>macdsignal[-1] else "死叉"

                  eng_text = (
                      f"The stock shows a {trend} trend with MA alignment, "
                      f"{'strong buy' if core_decision=='买入' else 'wait'} signal from trend analysis, "
                      f"and key chart patterns indicating potential for {'upward' if trend_strength>=50 else 'sideways'} movement."
                  )

                  rep = (
                      f"🟢 {code}\n"
                      f"📰 重要信息速览\n\n"
                      f"📍 核心结论\n"
                      f"🟢 {core_decision} | 技术面{trend}，趋势评分 {trend_strength}/100\n\n"
                      f"💬 一句话决策: {eng_text}\n\n"
                      f"⏱️ 时效性: 本周内\n\n"
                      f"• 持仓情况: 空仓者 | 操作建议: {action_empty}\n"
                      f"• 持仓情况: 持仓者 | 操作建议: {action_hold}\n\n"
                      f"📊 数据透视\n"
                      f"均线排列: {trend} | 多头排列: {'✅' if trend=='bullish' else '❌'} | 趋势强度: {trend_strength}/100\n\n"
                      f"• 价格指标: 当前价 | 当前价: {current_price:.2f}\n"
                      f"• 价格指标: MA5 | 当前价: {ma5:.2f}\n"
                      f"• 价格指标: MA10 | 当前价: {ma10:.2f}\n"
                      f"• 价格指标: MA20 | 当前价: {ma20:.2f}\n"
                      f"• 价格指标: 乖离率(MA5) | 当前价: {bias:.2f}% {bias_note}\n"
                      f"• 价格指标: 支撑位 | 当前价: {support:.2f}\n"
                      f"• 价格指标: 压力位 | 当前价: {resistance:.2f}\n\n"
                      f"成交量: 量比 {vol_ratio:.2f} ({vol_note}) | 换手率 {turnover:.1f}%\n\n"
                      f"💡 技术面解读: {eng_text}\n\n"
                      f"🎯 作战计划\n"
                      f"📍 操作点位\n"
                      f"• 操作点位: 🎯 理想买入点 | 当前价: {buy_point:.2f}\n"
                      f"• 操作点位: 🔵 次优买入点 | 当前价: {secondary_buy:.2f}\n"
                      f"• 操作点位: 🔴 止损位 | 当前价: {stop_loss:.2f}\n"
                      f"• 操作点位: 🎉 目标位 | 当前价: {target:.2f}\n\n"
                      f"💰 仓位建议: {position}\n"
                      f"• 建仓策略: {action_empty}\n"
                      f"• 风控策略: 止损参考 {stop_loss:.2f}\n\n"
                      f"{'='*50}\n"
                  )
                  return rep, core_decision, trend_strength, trend

              except Exception as e:
                  return f"- {code}: 分析失败({str(e)})\n", "观望", 0, "neutral"

          def main():
              trade_date = get_recent_trade_date()
              report = f"📈 A股智能分析报告\n"
              report += f"🎯 {datetime.now().strftime('%Y-%m-%d')} 决策仪表盘\n\n"

              buy_cnt = 0
              wait_cnt = 0
              sell_cnt = 0
              stock_reports = []
              summary_list = []

              for code in STOCK_LIST:
                  code = code.strip()
                  if code:
                      rep, decision, score, trend = analyze_stock(code, trade_date)
                      stock_reports.append(rep)
                      summary_list.append((code, decision, score, trend))
                      if "买入" in decision:
                          buy_cnt +=1
                      elif "观望" in decision:
                          wait_cnt +=1
                      elif "卖出" in decision:
                          sell_cnt +=1

              report += f"💬 共分析 {len(STOCK_LIST)} 只股票 | 🟢买入:{buy_cnt} 🟡观望:{wait_cnt} 🔴卖出:{sell_cnt}\n\n"
              report += "📊 分析结果摘要\n"
              for code, decision, score, trend in summary_list:
                  report += f"🟢 {code}: {decision} | 评分 {score} | 技术面{trend}\n"
              report += "\n" + "="*50 + "\n\n"

              for rep in stock_reports:
                  report += rep

              report += f"\n报告生成时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}"
              report += "\n⚠️ 本报告仅供参考，不构成投资建议"
              send_feishu(report)

          if __name__ == "__main__":
              main()
          EOF
