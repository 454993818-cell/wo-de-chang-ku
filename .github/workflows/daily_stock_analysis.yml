
name: Daily Stock Analysis (Feishu Only)
on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas akshare

      - name: Run analysis and send to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python3 - << 'EOF'
          import os
          import requests
          import pandas as pd
          import akshare as ak
          from datetime import datetime, timedelta

          FEISHU_WEBHOOK_URL = os.getenv("FEISHU_WEBHOOK_URL")
          STOCK_LIST = os.getenv("STOCK_LIST").split(",") if os.getenv("STOCK_LIST") else []

          def get_recent_trade_date():
              today = datetime.today()
              for i in range(7):
                  date = (today - timedelta(days=i)).strftime("%Y%m%d")
                  try:
                      df = ak.stock_zh_index_daily(symbol="sh000001", start_date=date, end_date=date)
                      if not df.empty:
                          return date
                  except:
                      continue
              return "20260327"

          def send_feishu(content):
              if not FEISHU_WEBHOOK_URL:
                  print("Webhook 未配置")
                  return
              msg = {
                  "msg_type": "post",
                  "content": {
                      "post": {
                          "zh_cn": {
                              "title": "每日股票分析",
                              "content": [[{"tag": "text", "text": content}]]
                          }
                      }
                  }
              }
              try:
                  r = requests.post(FEISHU_WEBHOOK_URL, json=msg, timeout=10)
                  print("发送结果:", r.status_code, r.text)
              except Exception as e:
                  print("发送失败:", e)

          def main():
              trade_date = get_recent_trade_date()
              send_feishu(f"测试消息：当前使用交易日 {trade_date}")
              
              report = f"【每日股票分析】\n交易日: {trade_date}\n\n"
              for code in STOCK_LIST:
                  code = code.strip()
                  if not code:
                      continue
                  try:
                      df = ak.stock_zh_a_daily(symbol=code, start_date=trade_date, end_date=trade_date)
                      if df.empty:
                          report += f"- {code}: 当日无数据\n"
                          continue
                      close = df["close"].iloc[-1]
                      stop_loss = round(close * 0.98, 2)
                      target = round(close * 1.04, 2)
                      report += (
                          f"【{code}】\n"
                          f"当前价: {close}\n"
                          f"止损位: {stop_loss}\n"
                          f"目标位: {target}\n"
                          f"仓位建议: 轻仓试仓\n\n"
                      )
                  except Exception as e:
                      report += f"- {code}: 获取数据失败 ({str(e)})\n"
              
              send_feishu(report)

          if __name__ == "__main__":
              main()
          EOF
