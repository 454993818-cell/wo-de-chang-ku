name: Daily Stock Analysis (Feishu Only)
on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas akshare

      - name: Run analysis and send to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python3 - << 'EOF'
          import os
          import requests
          import pandas as pd
          import akshare as ak
          from datetime import datetime, timedelta

          FEISHU_WEBHOOK_URL = os.getenv("FEISHU_WEBHOOK_URL")
          STOCK_LIST = os.getenv("STOCK_LIST").split(",") if os.getenv("STOCK_LIST") else []

          print("===== 开始调试 =====")
          print("Webhook URL 长度:", len(FEISHU_WEBHOOK_URL) if FEISHU_WEBHOOK_URL else 0)
          print("监控股票列表:", STOCK_LIST)

          def get_recent_trade_date():
              today = datetime.today()
              for i in range(7):
                  date = (today - timedelta(days=i)).strftime("%Y%m%d")
                  try:
                      df = ak.stock_zh_index_daily(symbol="sh000001", start_date=date, end_date=date)
                      if not df.empty:
                          print("找到交易日:", date)
                          return date
                  except Exception as e:
                      print(f"日期 {date} 测试失败: {e}")
                      continue
              print("使用兜底日期: 20260327")
              return "20260327"

          def send_feishu(content):
              if not FEISHU_WEBHOOK_URL:
                  print("❌ 错误: FEISHU_WEBHOOK_URL 未配置")
                  return
              msg = {
                  "msg_type": "text",
                  "content": {"text": content}
              }
              try:
                  print("正在发送飞书消息...")
                  r = requests.post(FEISHU_WEBHOOK_URL, json=msg, timeout=10)
                  print(f"✅ 发送状态码: {r.status_code}")
                  print(f"✅ 响应内容: {r.text}")
                  return r.status_code == 200
              except Exception as e:
                  print(f"❌ 发送异常: {e}")
                  return False

          def main():
              trade_date = get_recent_trade_date()
              # 先发一条极简测试消息
              test_ok = send_feishu(f"【测试】云端系统运行成功，当前交易日: {trade_date}")
              if not test_ok:
                  print("❌ 测试消息发送失败，请检查 Webhook")
                  return

              report = f"【每日股票分析】\n交易日: {trade_date}\n\n"
              for code in STOCK_LIST:
                  code = code.strip()
                  if not code:
                      continue
                  try:
                      df = ak.stock_zh_a_daily(symbol=code, start_date=trade_date, end_date=trade_date)
                      if df.empty:
                          report += f"- {code}: 当日无数据\n"
                          continue
                      close = df["close"].iloc[-1]
                      stop_loss = round(close * 0.98, 2)
                      target = round(close * 1.04, 2)
                      report += (
                          f"【{code}】\n"
                          f"当前价: {close}\n"
                          f"止损位: {stop_loss}\n"
                          f"目标位: {target}\n"
                          f"仓位建议: 轻仓试仓\n\n"
                      )
                  except Exception as e:
                      report += f"- {code}: 获取数据失败 ({str(e)})\n"
              
              print("开始发送正式报告...")
              send_feishu(report)

          if __name__ == "__main__":
              main()
          EOF
