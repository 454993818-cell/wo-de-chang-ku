name: Daily Stock Analysis (Feishu Only)
on:
  schedule:
    - cron: '30 6 * * 1-5'  # 北京时间 14:30 执行
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas akshare
      - name: Run analysis script
        env:
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          cat > main.py << 'EOF'
          import os
          import requests
          import akshare as ak

          stock_list = os.getenv("STOCK_LIST", "").split(",")
          feishu_webhook = os.getenv("FEISHU_WEBHOOK", "")

          if not stock_list or not feishu_webhook:
              print("请配置 STOCK_LIST 和 FEISHU_WEBHOOK")
              exit(1)

          report = "【每日股票分析】\n"
          for code in stock_list:
              try:
                  df = ak.stock_zh_a_daily(symbol=code, adjust="hfq")
                  last = df.iloc[-1]
                  change = (last["close"] - last["open"]) / last["open"] * 100
                  report += f"- {code}: 收盘价 {last['close']:.2f}, 涨跌幅 {change:.2f}%\n"
              except Exception as e:
                  report += f"- {code}: 获取数据失败 ({e})\n"

          msg = {"msg_type": "text", "content": {"text": report}}
          requests.post(feishu_webhook, json=msg)
          print("推送完成")
          EOF
          python main.py
