
name: Daily Stock Analysis (Feishu Only)
on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas akshare ta-lib

      - name: Run analysis and send to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python3 - << 'EOF'
          import os
          import requests
          import pandas as pd
          import akshare as ak
          import talib
          from datetime import datetime, timedelta

          FEISHU_WEBHOOK_URL = os.getenv("FEISHU_WEBHOOK_URL")
          STOCK_LIST = os.getenv("STOCK_LIST").split(",") if os.getenv("STOCK_LIST") else []

          def get_recent_trade_date():
              today = datetime.today()
              for i in range(7):
                  date = (today - timedelta(days=i)).strftime("%Y%m%d")
                  try:
                      df = ak.stock_zh_index_daily(symbol="sh000001", start_date=date, end_date=date)
                      if not df.empty:
                          return date
                  except:
                      continue
              return datetime.today().strftime("%Y%m%d")

          def send_feishu(content):
              if not FEISHU_WEBHOOK_URL:
                  print("Webhook 未配置")
                  return
              msg = {
                  "msg_type": "text",
                  "content": {"text": content}
              }
              try:
                  r = requests.post(FEISHU_WEBHOOK_URL, json=msg, timeout=15)
                  print("发送状态:", r.status_code)
              except Exception as e:
                  print("发送异常:", e)

          def analyze_stock(code, trade_date):
              try:
                  if code.startswith("6"):
                      symbol = f"sh{code}"
                  elif code.startswith("0") or code.startswith("3"):
                      symbol = f"sz{code}"
                  else:
                      symbol = code

                  start_date = (datetime.strptime(trade_date, "%Y%m%d") - timedelta(days=70)).strftime("%Y%m%d")
                  df = ak.stock_zh_a_daily(symbol=symbol, start_date=start_date, end_date=trade_date)
                  if df.empty or len(df) < 30:
                      return f"- {code}: 样本不足\n"

                  df = df.sort_values("date").reset_index(drop=True)
                  close = df["close"].values
                  high = df["high"].values
                  low = df["low"].values
                  volume = df["volume"].values

                  ma5 = talib.SMA(close, 5)[-1]
                  ma10 = talib.SMA(close, 10)[-1]
                  ma20 = talib.SMA(close, 20)[-1]
                  rsi = talib.RSI(close, 14)[-1]
                  macd, macdsignal, macdhist = talib.MACD(close)
                  upper, middle, lower = talib.BBANDS(close, 20)
                  current_price = close[-1]
                  price_change = (current_price - close[-2])/close[-2]*100

                  vol_ma5 = talib.SMA(volume,5)[-1]
                  vol_current = volume[-1]
                  vol_signal = "放量" if vol_current>vol_ma5*1.3 else "缩量" if vol_current<vol_ma5*0.7 else "平量"

                  trend = "多头" if ma5>ma10>ma20 else "空头" if ma5<ma10<ma20 else "震荡"
                  rsi_note = "超买" if rsi>70 else "超卖" if rsi<30 else "中性"
                  bb_note = "上轨压力" if current_price>upper[-1] else "下轨支撑" if current_price<lower[-1] else "通道内"
                  macd_note = "金叉" if macd[-1]>macdsignal[-1] else "死叉"

                  score = 0
                  if trend=="多头": score+=3
                  if trend=="空头": score-=3
                  if vol_signal=="放量" and price_change>0: score+=2
                  if vol_signal=="放量" and price_change<0: score-=2
                  if rsi<30: score+=2
                  if rsi>70: score-=2
                  if current_price < lower[-1]: score+=2
                  if current_price > upper[-1]: score-=2

                  if score>=4:
                      strategy="强烈看多→加仓/建仓"
                      sl=round(current_price*0.96,2)
                      tg=round(current_price*1.08,2)
                  elif score>=1:
                      strategy="谨慎看多→轻仓试仓"
                      sl=round(current_price*0.97,2)
                      tg=round(current_price*1.06,2)
                  elif score<=-4:
                      strategy="强烈看空→减仓/清仓"
                      sl=tg=None
                  elif score<=-1:
                      strategy="谨慎看空→观望"
                      sl=tg=None
                  else:
                      strategy="中性震荡→多看少动"
                      sl=round(current_price*0.98,2)
                      tg=round(current_price*1.04,2)

                  rep = (
                      f"【{code}】\n"
                      f"📊 现价:{current_price:.2f} | 涨跌幅:{price_change:.2f}%\n"
                      f"📉 均线:{ma5:.2f}/{ma10:.2f}/{ma20:.2f} → {trend}\n"
                      f"⚡ RSI(14):{rsi:.1f} → {rsi_note}\n"
                      f"📈 量能:{vol_signal} | MACD:{macd_note}\n"
                      f"🎯 布林带:{bb_note}\n"
                      f"💡 策略评分:{score} → {strategy}\n"
                  )
                  if sl and tg:
                      rep += f"🛡️ 止损:{sl} | 🎯 目标:{tg}\n\n"
                  else:
                      rep += "\n"
                  return rep

              except Exception as e:
                  return f"- {code}: 分析失败({str(e)})\n"

          def main():
              trade_date = get_recent_trade_date()

              report = f"📈【每日股票策略分析】\n📅 交易日:{trade_date}\n\n"
              report += "="*50 + "\n\n"

              for code in STOCK_LIST:
                  code = code.strip()
                  if code:
                      report += analyze_stock(code, trade_date)

              report += "⚠️ 本报告仅供参考，不构成投资建议"
              send_feishu(report)

          if __name__ == "__main__":
              main()
          EOF
