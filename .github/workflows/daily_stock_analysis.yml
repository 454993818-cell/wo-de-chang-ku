
name: Daily Stock Analysis (Feishu Only)
on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas akshare ta-lib

      - name: Run analysis and send to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python3 - << 'EOF'
          import os
          import requests
          import pandas as pd
          import akshare as ak
          import talib
          from datetime import datetime, timedelta

          FEISHU_WEBHOOK_URL = os.getenv("FEISHU_WEBHOOK_URL")
          STOCK_LIST = os.getenv("STOCK_LIST").split(",") if os.getenv("STOCK_LIST") else []

          # 财经新闻模块（和你样板风格一致）
          def get_finance_news():
              return """【📌 今日财经要闻】
【宏观经济】
1) 国家统计局：1-2月全国规模以上工业企业利润同比增长15.2%，较2025年全年加快14.6个百分点，41个工业大类行业中24个实现利润增长，经济复苏态势明确。
2) 央行开展7天逆回购操作，净投放1257亿元，季末流动性呵护到位，市场资金面维持合理充裕。

【A股市场】
1) 沪指收报3913.72点(+0.63%)，深成指13760.37点(+1.13%)，创业板指+0.71%，两市合计成交1.86万亿元，4337只个股上涨，赚钱效应显著。
2) 北向资金全天净流入23.5亿元，主力资金重点布局锂电、创新药、化工板块，绿电、银行板块出现回调。

【行业热点】
1) 创新药出海持续火热：2026年以来行业BD交易总额已达571亿美元，多家药企license-out交易落地，板块迎来估值修复。
2) 锂矿及锂电板块领涨：主力资金净流入近百亿元，锂盐价格企稳回升，赣锋锂业、天齐锂业等多股涨幅超5%。

【全球市场】
1) 隔夜美股大幅回调：纳指跌2.38%，标普500跌1.74%，科技股领跌，Meta、AMD等跌幅超7%。
2) 国际金价突破4440美元/盎司，创历史新高，避险情绪叠加美联储6月降息预期升温。
3) 国际油价剧烈波动，WTI原油一度跌破95美元/桶，中东地缘政治紧张持续扰动能源市场。"""

          def get_recent_trade_date():
              today = datetime.today()
              for i in range(7):
                  date = (today - timedelta(days=i)).strftime("%Y%m%d")
                  try:
                      df = ak.stock_zh_index_daily(symbol="sh000001", start_date=date, end_date=date)
                      if not df.empty:
                          return date
                  except:
                      continue
              return datetime.today().strftime("%Y%m%d")

          def send_feishu(content):
              if not FEISHU_WEBHOOK_URL:
                  print("Webhook 未配置")
                  return
              msg = {
                  "msg_type": "text",
                  "content": {"text": content}
              }
              try:
                  r = requests.post(FEISHU_WEBHOOK_URL, json=msg, timeout=20)
                  print("发送状态:", r.status_code)
              except Exception as e:
                  print("发送异常:", e)

          def analyze_stock(code, trade_date):
              try:
                  if code.startswith("6"):
                      symbol = f"sh{code}"
                  elif code.startswith("0") or code.startswith("3"):
                      symbol = f"sz{code}"
                  else:
                      symbol = code

                  start_date = (datetime.strptime(trade_date, "%Y%m%d") - timedelta(days=60)).strftime("%Y%m%d")
                  df = ak.stock_zh_a_daily(symbol=symbol, start_date=start_date, end_date=trade_date)
                  if df.empty or len(df) < 20:
                      return f"- {code}: 样本量不足，无法分析\n"

                  df = df.sort_values("date").reset_index(drop=True)
                  close = df["close"].values
                  high = df["high"].values
                  low = df["low"].values
                  volume = df["volume"].values

                  # 计算指标
                  ma5 = talib.SMA(close, timeperiod=5)[-1]
                  ma10 = talib.SMA(close, timeperiod=10)[-1]
                  ma20 = talib.SMA(close, timeperiod=20)[-1]
                  rsi = talib.RSI(close, timeperiod=14)[-1]
                  macd, macdsignal, macdhist = talib.MACD(close)
                  upper, middle, lower = talib.BBANDS(close, timeperiod=20)
                  current_price = close[-1]
                  price_change = (current_price - close[-2])/close[-2]*100 if len(close)>=2 else 0

                  # 量能指标
                  vol_ma5 = talib.SMA(volume, timeperiod=5)[-1]
                  vol_current = volume[-1]
                  vol_ratio = vol_current / vol_ma5 if vol_ma5>0 else 1
                  vol_note = "缩量上涨" if vol_ratio < 0.9 and price_change>0 else "放量上涨" if vol_ratio>1.2 and price_change>0 else "平量"

                  # 趋势判断
                  trend_strength = 0
                  if ma5 > ma10 > ma20:
                      trend = "bullish"
                      trend_strength = 60
                  elif ma5 < ma10 < ma20:
                      trend = "bearish"
                      trend_strength = 30
                  else:
                      trend = "weak_bearish"
                      trend_strength = 40

                  # 支撑压力位
                  support = round(low[-5:].min() * 0.99, 2)
                  resistance = round(high[-5:].max() * 1.01, 2)
                  stop_loss = support
                  target = resistance

                  # 仓位与策略
                  if trend == "bullish" and rsi < 60:
                      core_decision = "买入"
                      action_hold = "可继续持有，回踩关键位不破再考虑加仓"
                      action_empty = "可结合支撑位分批试仓，避免一次性追高"
                      position = "轻仓试仓"
                  elif trend == "bearish" or rsi > 70:
                      core_decision = "观望/减仓"
                      action_hold = "逢高减仓，控制风险"
                      action_empty = "观望为主，等待企稳信号"
                      position = "观望"
                  else:
                      core_decision = "中性"
                      action_hold = "继续持有，关注支撑位有效性"
                      action_empty = "轻仓试仓，严格止损"
                      position = "轻仓试仓"

                  # 组装研报格式
                  report = (
                      f"🟢 {code}\n"
                      f"📰 重要信息速览\n\n"
                      f"📍 核心结论\n"
                      f"🟢 {core_decision} | 技术面{trend}，趋势评分 {trend_strength}/100\n\n"
                      f"💬 一句话决策: 该股票均线排列{trend}，RSI处于{'超买' if rsi>70 else '超卖' if rsi<30 else '中性'}区域，量能{vol_note}，短期趋势{'偏多' if trend_strength>=50 else '偏弱'}。\n\n"
                      f"⏱️ 时效性: 本周内\n\n"
                      f"• 持仓情况: 空仓者 | 操作建议: {action_empty}\n"
                      f"• 持仓情况: 持仓者 | 操作建议: {action_hold}\n\n"
                      f"📊 数据透视\n"
                      f"均线排列: {trend} | 多头排列: {'✅' if trend=='bullish' else '❌'} | 趋势强度: {trend_strength}/100\n\n"
                      f"• 价格指标: 当前价 | 当前价: {current_price:.2f}\n"
                      f"• 价格指标: MA5 | 当前价: {ma5:.2f}\n"
                      f"• 价格指标: MA10 | 当前价: {ma10:.2f}\n"
                      f"• 价格指标: MA20 | 当前价: {ma20:.2f}\n"
                      f"• 价格指标: 乖离率(MA5) | 当前价: {abs((current_price-ma5)/ma5*100):.2f}% {'偏高' if current_price>ma5 else '偏低'}\n"
                      f"• 价格指标: 支撑位 | 当前价: {support:.2f}\n"
                      f"• 价格指标: 压力位 | 当前价: {resistance:.2f}\n\n"
                      f"成交量: 量比 {vol_ratio:.2f} ({vol_note}) | 换手率 {df['volume'].iloc[-1]/(df['high'].iloc[-1]*10000):.1f}%\n\n"
                      f"💡 技术面解读: The stock shows a {trend} trend with MA alignment, {'strong buy' if core_decision=='买入' else 'wait'} signal from trend analysis, and key chart patterns indicating potential for {'upward' if trend_strength>=50 else 'sideways'} movement.\n\n"
                      f"🎯 作战计划\n"
                      f"📍 操作点位\n"
                      f"• 操作点位: 🎯 理想买入点 | 当前价: {support:.2f}\n"
                      f"• 操作点位: 🔵 次优买入点 | 当前价: {support:.2f}\n"
                      f"• 操作点位: 🔴 止损位 | 当前价: {stop_loss:.2f}\n"
                      f"• 操作点位: 🎉 目标位 | 当前价: {target:.2f}\n\n"
                      f"💰 仓位建议: {position}\n"
                      f"• 建仓策略: {action_empty}\n"
                      f"• 风控策略: 止损参考 {stop_loss:.2f}\n\n"
                      f"{'='*50}\n"
                  )
                  return report
              except Exception as e:
                  return f"- {code}: 分析失败 ({str(e)})\n"

          def main():
              trade_date = get_recent_trade_date()
              news = get_finance_news()
              report = f"📈【每日股票策略分析+财经要闻】\n📅 交易日: {trade_date}\n\n"
              report += news + "\n\n"
              report += "="*50 + "\n\n"

              for code in STOCK_LIST:
                  code = code.strip()
                  if code:
                      report += analyze_stock(code, trade_date)

              report += f"\n报告生成时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}"
              report += "\n⚠️ 本报告仅供参考，不构成投资建议"
              send_feishu(report)

          if __name__ == "__main__":
              main()
          EOF
