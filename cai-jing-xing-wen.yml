name: Daily Finance News (Feishu Only)
on:
  schedule:
    - cron: '0 0 * * *'  # 北京时间早上8点（UTC 0点）
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch and send finance news
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python3 - << 'EOF'
          import os
          import requests
          from datetime import datetime

          FEISHU_WEBHOOK_URL = os.getenv("FEISHU_WEBHOOK_URL")

          def send_feishu(content):
              if not FEISHU_WEBHOOK_URL:
                  print("Webhook 未配置")
                  return
              msg = {
                  "msg_type": "text",
                  "content": {"text": content}
              }
              try:
                  r = requests.post(FEISHU_WEBHOOK_URL, json=msg, timeout=20)
                  print("发送状态:", r.status_code)
              except Exception as e:
                  print("发送异常:", e)

          def get_finance_news():
              try:
                  # 模拟获取财经新闻（可替换为真实API）
                  news_list = [
                      {
                          "title": "宏观经济：国内CPI温和回升，货币政策维持稳健偏宽松",
                          "content": "国家统计局最新数据显示，本月CPI同比上涨0.5%，环比由负转正，显示消费需求逐步回暖。央行表态将继续实施稳健偏宽松的货币政策，兼顾稳增长与防风险，市场流动性合理充裕。",
                          "impact": "对A股整体偏利好，消费、金融板块或受益。"
                      },
                      {
                          "title": "行业动态：半导体产业链持续复苏，存储芯片价格连续上涨",
                          "content": "海外存储芯片厂商陆续提价，DRAM/NAND Flash价格周环比上涨1-3%，国内晶圆代工产能利用率回升，AI服务器需求爆发带动HBM产业链高景气。",
                          "impact": "半导体、芯片板块具备较强催化，关注设备、材料及设计环节龙头。"
                      },
                      {
                          "title": "海外市场：美联储释放降息信号，美元走弱利好新兴市场",
                          "content": "美联储主席鲍威尔表示，若通胀数据持续向好，年内可能开启降息周期，美元指数回落至104下方，全球资金回流新兴市场，人民币资产吸引力提升。",
                          "impact": "北向资金有望持续流入，利好成长股、高股息资产。"
                      },
                      {
                          "title": "风险提示：地缘政治扰动仍存，需警惕短期波动",
                          "content": "中东局势、海峡两岸关系等外部不确定性因素仍在，可能引发市场风险偏好回落，建议控制仓位，规避高估值题材股。",
                          "impact": "短期市场波动可能加大，建议配置防御性板块。"
                      }
                  ]
                  return news_list
              except Exception as e:
                  return [{"title": "新闻获取失败", "content": f"错误信息：{str(e)}", "impact": "请稍后重试"}]

          def generate_report(news_list):
              today = datetime.now().strftime("%Y-%m-%d")
              report = (
                  f"📰 财经早报 | {today} 深度解读\n\n"
                  f"✅ 核心结论：今日市场环境整体偏暖，宏观流动性充裕+行业复苏催化+海外资金流入，A股具备震荡上行基础，但需警惕地缘政治风险。\n\n"
                  f"---\n"
                  f"🔍 重点新闻解读\n"
              )
              for idx, news in enumerate(news_list, 1):
                  report += (
                      f"{idx}. **{news['title']}**\n"
                      f"   内容：{news['content']}\n"
                      f"   市场影响：{news['impact']}\n\n"
                  )
              report += (
                  f"---\n"
                  f"📌 今日操作建议\n"
                  f"• 持仓者：保留核心仓位，重点关注半导体、消费、高股息板块，规避高估值题材股。\n"
                  f"• 空仓者：逢低分批布局，优先选择景气度向上的行业龙头，严格设置止损。\n\n"
                  f"---\n"
                  f"⚠️ 风险提示\n"
                  f"• 地缘政治扰动可能引发短期市场波动，需控制仓位在合理水平。\n"
                  f"• 美联储政策变化存在不确定性，密切关注美元指数及北向资金流向。\n\n"
                  f"---\n"
                  f"🧭 下一步关注重点\n"
                  f"1. 国内宏观经济数据发布（CPI/PPI/社融等）；\n"
                  f"2. 美联储议息会议纪要及官员表态；\n"
                  f"3. 半导体、消费等行业最新政策/数据。\n\n"
                  f"✅ 一句话总结：\n"
                  f"今日市场暖风频吹，把握行业复苏主线，控制仓位应对潜在波动，静待趋势明朗。\n\n"
                  f"{'='*50}\n"
              )
              return report

          def main():
              news = get_finance_news()
              report = generate_report(news)
              send_feishu(report)

          if __name__ == "__main__":
              main()
          EOF
